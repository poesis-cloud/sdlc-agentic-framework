workflow:
  id: scrum
  facilitator: '@scrum-master'
  steps:
  - id: plan-iteration
    kind: delegate
    delegates_to: workflows/iteration-planning
    actor: '@scrum-master'
    conditions:
    - id: status_committed_backlog
      kind: postcondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "backlog")
  - id: groom-story
    kind: delegate
    delegates_to: workflows/story-backlog-refinement
    actor: '@scrum-master'
    conditions:
    - id: after_plan_iteration
      kind: precondition
      type: after
      step_id: plan-iteration
    - id: story_in_backlog
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "backlog")
  - id: story-gate
    kind: gate
    gate: ★ Story Gate
    actor: '@scrum-master'
    conditions:
    - id: after_groom_story
      kind: precondition
      type: after
      step_id: groom-story
    - id: story_in_backlog
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "backlog")
  - id: execute-story
    kind: delegate
    delegates_to: workflows/pair-programming
    actor: '@scrum-master'
    conditions:
    - id: after_story_gate
      kind: precondition
      type: after
      step_id: story-gate
    - id: story_ready
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "ready")
  - id: accept-to-qa
    kind: direct
    actor: '@scrum-master'
    conditions:
    - id: after_execute_story
      kind: precondition
      type: after
      step_id: execute-story
    - id: story_in_review
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "in-review")
    - id: status_committed_in_qa
      kind: postcondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "in-qa")
  - id: verify-story
    kind: delegate
    delegates_to: workflows/verification
    actor: '@scrum-master'
    conditions:
    - id: after_accept_to_qa
      kind: precondition
      type: after
      step_id: accept-to-qa
    - id: story_in_qa
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "in-qa")
    - id: status_committed_awaiting_pr_with_cost
      kind: postcondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "awaiting-pr" && has(x.cost))
  - id: pr-gate
    kind: gate
    gate: ★ PR Gate
    actor: central-supervisor (Business-Owner hat)
    conditions:
    - id: after_verify_story
      kind: precondition
      type: after
      step_id: verify-story
    - id: story_awaiting_pr
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "awaiting-pr")
