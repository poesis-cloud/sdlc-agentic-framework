workflow:
  id: scrum
  facilitator: '@scrum-master'
  steps:
  - id: plan-iteration
    kind: delegate
    delegates_to: workflows/iteration-planning
    actor: '@scrum-master'
    conditions:
    - { id: input_features, kind: precondition, type: input, expression: ref, value: 'portfolio/{product}/features/' }
    - { id: committed_parent_feature_provided, kind: precondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.committed_parent_feature_provided) && unit.attestations.committed_parent_feature_provided' }
    - { id: story_owner_owns_status, kind: invariant, type: authority, expression: instruction, value: 'instructions/story-owner-owns-status.instructions.md' }
    - { id: output_kanban, kind: postcondition, type: output, expression: ref, value: 'portfolio/{product}/kanban/' }
    - { id: stories_authored_and_pairs_assigned, kind: postcondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.stories_authored_and_pairs_assigned) && unit.attestations.stories_authored_and_pairs_assigned' }
    - { id: status_committed_backlog, kind: postcondition, type: transition, expression: cel, value: 'status == "backlog"' }
  - id: groom-story
    kind: delegate
    delegates_to: workflows/story-backlog-refinement
    actor: '@scrum-master'
    conditions:
    - { id: after_plan_iteration, kind: precondition, type: after, expression: ref, value: 'plan-iteration' }
    - { id: story_in_backlog, kind: precondition, type: state, expression: cel, value: 'status == "backlog"' }
    - { id: not_yet_dor_ready_else_trivial, kind: precondition, type: state, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.not_yet_dor_ready_else_trivial) && unit.attestations.not_yet_dor_ready_else_trivial' }
    - { id: story_owner_owns_status_content_stays_owner_owned, kind: invariant, type: authority, expression: instruction, value: 'instructions/story-owner-owns-status-content-stays-owner-owned.instructions.md' }
    - { id: grooming_packet_committed, kind: postcondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.grooming_packet_committed) && unit.attestations.grooming_packet_committed' }
  - id: story-gate
    kind: gate
    gate: ★ Story Gate
    actor: '@scrum-master'
    conditions:
    - { id: after_groom_story, kind: precondition, type: after, expression: ref, value: 'groom-story' }
    - { id: input_features, kind: precondition, type: input, expression: ref, value: 'portfolio/{product}/features/' }
    - { id: story_in_backlog, kind: precondition, type: state, expression: cel, value: 'status == "backlog"' }
    - { id: no_open_blocking_items, kind: precondition, type: state, expression: cel, value: 'open_items_clear' }
    - { id: story_gate_sm_run_dor, kind: invariant, type: authority, expression: instruction, value: 'instructions/story-gate-sm-run-dor.instructions.md' }
    - { id: output_kanban, kind: postcondition, type: output, expression: ref, value: 'portfolio/{product}/kanban/' }
    - { id: story_gate_verdict_recorded, kind: postcondition, type: transition, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.story_gate_verdict_recorded) && unit.attestations.story_gate_verdict_recorded' }
  - id: execute-story
    kind: delegate
    delegates_to: workflows/pair-programming
    actor: '@scrum-master'
    conditions:
    - { id: after_story_gate, kind: precondition, type: after, expression: ref, value: 'story-gate' }
    - { id: story_ready, kind: precondition, type: state, expression: cel, value: 'status == "ready"' }
    - { id: story_owner_owns_status_pair_authors_code, kind: invariant, type: authority, expression: instruction, value: 'instructions/story-owner-owns-status-pair-authors-code.instructions.md' }
    - { id: pair_micro_cycle_driven, kind: postcondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.pair_micro_cycle_driven) && unit.attestations.pair_micro_cycle_driven' }
    - { id: story_driven_in_progress, kind: postcondition, type: transition, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.story_driven_in_progress) && unit.attestations.story_driven_in_progress' }
  - id: accept-to-qa
    kind: direct
    actor: '@scrum-master'
    conditions:
    - { id: after_execute_story, kind: precondition, type: after, expression: ref, value: 'execute-story' }
    - { id: story_in_review, kind: precondition, type: state, expression: cel, value: 'status == "in-review"' }
    - { id: critique_accepted_and_wip_ok, kind: precondition, type: state, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.critique_accepted_and_wip_ok) && unit.attestations.critique_accepted_and_wip_ok' }
    - { id: story_owner_owns_status, kind: invariant, type: authority, expression: instruction, value: 'instructions/story-owner-owns-status.instructions.md' }
    - { id: output_kanban, kind: postcondition, type: output, expression: ref, value: 'portfolio/{product}/kanban/' }
    - { id: status_committed_in_qa, kind: postcondition, type: transition, expression: cel, value: 'status == "in-qa"' }
  - id: verify-story
    kind: delegate
    delegates_to: workflows/verification
    actor: '@scrum-master'
    conditions:
    - { id: after_accept_to_qa, kind: precondition, type: after, expression: ref, value: 'accept-to-qa' }
    - { id: input_features, kind: precondition, type: input, expression: ref, value: 'portfolio/{product}/features/' }
    - { id: story_in_qa, kind: precondition, type: state, expression: cel, value: 'status == "in-qa"' }
    - { id: story_owner_owns_status_qa_security_verdicts_only, kind: invariant, type: authority, expression: instruction, value: 'instructions/story-owner-owns-status-qa-security-verdicts-only.instructions.md' }
    - { id: qa_signoff_and_security_verdict_committed, kind: postcondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.qa_signoff_and_security_verdict_committed) && unit.attestations.qa_signoff_and_security_verdict_committed' }
    - { id: status_committed_awaiting_pr_with_cost, kind: postcondition, type: transition, expression: cel, value: 'status == "awaiting-pr" && has(unit.cost)' }
  - id: pr-gate
    kind: gate
    gate: ★ PR Gate
    actor: central-supervisor (Business-Owner hat)
    conditions:
    - { id: after_verify_story, kind: precondition, type: after, expression: ref, value: 'verify-story' }
    - { id: input_features, kind: precondition, type: input, expression: ref, value: 'portfolio/{product}/features/' }
    - { id: story_awaiting_pr, kind: precondition, type: state, expression: cel, value: 'status == "awaiting-pr"' }
    - { id: gate_packet_ok, kind: precondition, type: state, expression: cel, value: 'gate_packet_ok' }
    - { id: human_decides_gate_rte_merges, kind: invariant, type: authority, expression: instruction, value: 'instructions/human-decides-gate-rte-merges.instructions.md' }
    - { id: output_gate_decisions_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/gate-decisions.md' }
    - { id: story_merged_and_rolled_up, kind: postcondition, type: transition, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.story_merged_and_rolled_up) && unit.attestations.story_merged_and_rolled_up' }
