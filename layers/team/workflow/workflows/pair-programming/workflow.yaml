workflow:
  id: pair-programming
  kind: practice
  parent: scrum
  facilitator: '@scrum-master'
  steps:
  - id: drive
    kind: author
    actor: '@developer'
    output: code-change
    conditions:
    - id: story_in_active_range
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: story
      set_predicate: unit.status == "ready" || unit.status == "in-progress" || unit.status
        == "in-review"
  - id: critique
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - id: after_drive
      kind: precondition
      type: after
      step_id: drive
  - id: critique-security
    kind: challenge
    actor: '@security-expert'
    output: security-review
    conditions:
    - id: after_drive
      kind: precondition
      type: after
      step_id: drive
