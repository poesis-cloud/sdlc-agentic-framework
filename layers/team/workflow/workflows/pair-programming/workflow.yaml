workflow:
  version: 2
  id: pair-programming
  rank: suborchestration
  kind: practice
  parent: scrum
  facilitator: '@scrum-master'
  skills: [pair-programming]
  log_dir: portfolio/logs/{orchestration}/{product}/{unit_id}
  steps:
  - id: drive
    kind: author
    actor: '@developer'
    output: code-change
    conditions:
    - kind: precondition
      type: input
      expression: ref
      value: portfolio/{product}/features/
      id: input_features
    - kind: precondition
      type: state
      id: story_in_active_range
      expression: cel
      value: status == "ready" || status == "in-progress" || status == "in-review"
    - kind: postcondition
      type: content
      id: driver_commit_with_tests
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.driver_commit_with_tests) && unit.attestations.driver_commit_with_tests
  - id: critique
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: drive
      id: after_drive
    - kind: invariant
      type: authority
      id: navigator_distinct_from_driver
      expression: instruction
      value: instructions/navigator-distinct-from-driver.instructions.md
    - kind: postcondition
      type: content
      id: navigator_critique_recorded
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.navigator_critique_recorded) && unit.attestations.navigator_critique_recorded
  - id: critique-security
    kind: challenge
    actor: '@security-expert'
    output: security-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: drive
      id: after_drive
    - kind: invariant
      type: authority
      id: challenger_writes_no_owner_content
      expression: instruction
      value: instructions/challenger-writes-no-owner-content.instructions.md
    - kind: postcondition
      type: challenge
      id: security_review_recorded_or_trivial
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.security_review_recorded_or_trivial) && unit.attestations.security_review_recorded_or_trivial
