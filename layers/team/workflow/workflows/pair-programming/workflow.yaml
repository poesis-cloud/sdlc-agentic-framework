workflow:
  id: pair-programming
  kind: practice
  parent: scrum
  facilitator: '@scrum-master'
  steps:
  - id: drive
    kind: author
    actor: '@developer'
    output: code-change
    conditions:
    - id: story_in_active_range
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "ready" || x.status == "in-progress"
        || x.status == "in-review")
  - id: critique
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - id: after_drive
      kind: precondition
      type: after
      step_id: drive
  - id: critique-security
    kind: challenge
    actor: '@security-expert'
    output: security-review
    conditions:
    - id: after_drive
      kind: precondition
      type: after
      step_id: drive
