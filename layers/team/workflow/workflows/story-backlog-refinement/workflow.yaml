workflow:
  id: story-backlog-refinement
  kind: ceremony
  parent: scrum
  facilitator: '@scrum-master'
  steps:
  - id: draft
    kind: author
    actor: '@product-owner'
    output: story
    conditions:
    - id: story_in_backlog
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "backlog")
    instructions:
    - instructions/discovery-open-items-recorded-or-explicitly-none.instructions.md
  - id: challenge-split
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - id: after_draft
      kind: precondition
      type: after
      step_id: draft
  - id: challenge-testability
    kind: challenge
    actor: '@quality-engineer'
    output: testability-review
    conditions:
    - id: after_draft
      kind: precondition
      type: after
      step_id: draft
  - id: challenge-ux
    kind: challenge
    actor: '@ux-designer'
    output: ux-review
    conditions:
    - id: after_draft
      kind: precondition
      type: after
      step_id: draft
  - id: challenge-architecture
    kind: challenge
    actor: '@system-architect'
    output: architecture-review
    conditions:
    - id: after_draft
      kind: precondition
      type: after
      step_id: draft
  - id: owner-rewrite
    kind: author
    actor: '@product-owner'
    output: story
    conditions:
    - id: after_challenge_split
      kind: precondition
      type: after
      step_id: challenge-split
    - id: after_challenge_testability
      kind: precondition
      type: after
      step_id: challenge-testability
    - id: after_challenge_ux
      kind: precondition
      type: after
      step_id: challenge-ux
    - id: after_challenge_architecture
      kind: precondition
      type: after
      step_id: challenge-architecture
