workflow:
  version: 2
  id: story-backlog-refinement
  rank: suborchestration
  kind: ceremony
  parent: scrum
  facilitator: '@scrum-master'
  skills: [story-backlog-refinement]
  log_dir: portfolio/logs/{orchestration}/{product}/{unit_id}
  steps:
  - id: draft
    kind: author
    actor: '@product-owner'
    output: story
    conditions:
    - kind: precondition
      type: input
      expression: ref
      value: portfolio/{product}/features/
      id: input_features
    - kind: precondition
      type: state
      id: story_in_backlog
      expression: cel
      value: status == "backlog"
    - kind: invariant
      type: clarification
      id: discovery_open_items_recorded_or_explicitly_none
      expression: instruction
      value: instructions/discovery-open-items-recorded-or-explicitly-none.instructions.md
    - kind: postcondition
      type: content
      id: owner_author_output_committed
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.owner_author_output_committed) && unit.attestations.owner_author_output_committed
    - kind: postcondition
      type: content
      id: work_item_relations_classified
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.work_item_relations_classified) && unit.attestations.work_item_relations_classified
  - id: challenge-split
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: draft
      id: after_draft
    - kind: invariant
      type: authority
      id: challenger_writes_no_owner_content
      expression: instruction
      value: instructions/challenger-writes-no-owner-content.instructions.md
    - kind: postcondition
      type: challenge
      id: developer_split_dependency_challenge_recorded
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.developer_split_dependency_challenge_recorded) && unit.attestations.developer_split_dependency_challenge_recorded
  - id: challenge-testability
    kind: challenge
    actor: '@quality-engineer'
    output: testability-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: draft
      id: after_draft
    - kind: invariant
      type: authority
      id: challenger_writes_no_owner_content
      expression: instruction
      value: instructions/challenger-writes-no-owner-content.instructions.md
    - kind: postcondition
      type: challenge
      id: quality_engineer_testability_challenge_recorded
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.quality_engineer_testability_challenge_recorded) && unit.attestations.quality_engineer_testability_challenge_recorded
  - id: challenge-ux
    kind: challenge
    actor: '@ux-designer'
    output: ux-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: draft
      id: after_draft
    - kind: invariant
      type: authority
      id: challenger_writes_no_owner_content
      expression: instruction
      value: instructions/challenger-writes-no-owner-content.instructions.md
    - kind: postcondition
      type: challenge
      id: ux_clarification_recorded_or_waived
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.ux_clarification_recorded_or_waived) && unit.attestations.ux_clarification_recorded_or_waived
  - id: challenge-architecture
    kind: challenge
    actor: '@system-architect'
    output: architecture-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: draft
      id: after_draft
    - kind: invariant
      type: authority
      id: challenger_writes_no_owner_content
      expression: instruction
      value: instructions/challenger-writes-no-owner-content.instructions.md
    - kind: postcondition
      type: challenge
      id: architecture_clarification_recorded_or_waived
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.architecture_clarification_recorded_or_waived) && unit.attestations.architecture_clarification_recorded_or_waived
  - id: owner-rewrite
    kind: author
    actor: '@product-owner'
    output: story
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: challenge-split
      id: after_challenge_split
    - kind: precondition
      type: after
      expression: ref
      value: challenge-testability
      id: after_challenge_testability
    - kind: precondition
      type: after
      expression: ref
      value: challenge-ux
      id: after_challenge_ux
    - kind: precondition
      type: after
      expression: ref
      value: challenge-architecture
      id: after_challenge_architecture
    - kind: postcondition
      type: content
      id: owner_rewrite_completed_after_challenge
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.owner_rewrite_completed_after_challenge) && unit.attestations.owner_rewrite_completed_after_challenge
    - kind: postcondition
      type: state
      id: blocking_open_items_resolved_or_deferred
      expression: cel
      value: open_items_clear
