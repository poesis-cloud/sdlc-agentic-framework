workflow:
  id: verification
  kind: practice
  parent: scrum
  facilitator: '@scrum-master'
  steps:
  - id: verify
    kind: verify
    actor: '@quality-engineer'
    conditions:
    - id: story_in_qa
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: story
      set_predicate: unit.status == "in-qa"
    - id: story_cost_committed_once
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: story
      set_predicate: has(unit.cost)
