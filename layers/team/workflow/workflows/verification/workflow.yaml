workflow:
  id: verification
  kind: practice
  parent: scrum
  facilitator: '@scrum-master'
  steps:
  - id: verify
    kind: verify
    actor: '@quality-engineer'
    conditions:
    - id: story_in_qa
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "in-qa")
    - id: story_cost_committed_once
      kind: postcondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, has(x.cost))
