workflow:
  id: verification
  kind: practice
  parent: scrum
  facilitator: "@scrum-master"
  steps:
    - id: verify
      kind: verify
      actor: "@quality-engineer"
      conditions:
        - { id: input_features, kind: precondition, type: input, expression: ref, value: 'portfolio/{product}/features/' }
        - { id: story_in_qa, kind: precondition, type: state, expression: cel, value: 'status == "in-qa"' }
        - { id: verifier_writes_no_owner_content, kind: invariant, type: authority, expression: instruction, value: 'instructions/verifier-writes-no-owner-content.instructions.md' }
        - { id: acceptance_criteria_and_dod_verified, kind: postcondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.acceptance_criteria_and_dod_verified) && unit.attestations.acceptance_criteria_and_dod_verified' }
        - { id: qa_signoff_committed_on_pass_or_bug_report_on_fail, kind: postcondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.qa_signoff_committed_on_pass_or_bug_report_on_fail) && unit.attestations.qa_signoff_committed_on_pass_or_bug_report_on_fail' }
        - { id: security_verdict_recorded, kind: postcondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.security_verdict_recorded) && unit.attestations.security_verdict_recorded' }
        - { id: story_cost_committed_once, kind: postcondition, type: transition, expression: cel, value: 'has(unit.cost)' }
        - { id: story_cost_snapshot_measured_once_from_logs, kind: invariant, type: content, expression: instruction, value: 'instructions/story-cost-snapshot-measured-once-from-logs.instructions.md' }
        - { id: board_publication_prepared_for_pr_gate, kind: postcondition, type: transition, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.board_publication_prepared_for_pr_gate) && unit.attestations.board_publication_prepared_for_pr_gate' }
