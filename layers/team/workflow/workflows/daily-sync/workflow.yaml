workflow:
  id: daily-sync
  kind: ceremony
  parent: scrum
  facilitator: '@scrum-master'
  steps:
  - id: sync
    kind: author
    actor: '@scrum-master'
    output: daily
    conditions:
    - id: input_features
      kind: precondition
      type: input
      expression: ref
      value: portfolio/{product}/features/
    - id: story_wip_and_blockers_walked
      kind: postcondition
      type: content
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.story_wip_and_blockers_walked)
        && unit.attestations.story_wip_and_blockers_walked
    - id: blocked_or_unblocked_reason_present
      kind: postcondition
      type: state
      expression: cel
      value: blocked_route_ok
    - id: daily_note_and_progress_committed
      kind: postcondition
      type: content
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.daily_note_and_progress_committed)
        && unit.attestations.daily_note_and_progress_committed
    instructions:
    - instructions/driver-navigator-status-recorded.instructions.md
