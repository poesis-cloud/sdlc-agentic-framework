workflow:
  id: iteration-planning
  kind: ceremony
  parent: scrum
  facilitator: '@scrum-master'
  steps:
  - id: author-stories
    kind: author
    actor: '@product-owner'
    output: story
    conditions:
    - id: feature_committed
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "committed")
  - id: challenge-sizing
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - id: after_author_stories
      kind: precondition
      type: after
      step_id: author-stories
  - id: challenge-testability
    kind: challenge
    actor: '@quality-engineer'
    output: testability-review
    conditions:
    - id: after_author_stories
      kind: precondition
      type: after
      step_id: author-stories
  - id: challenge-flag
    kind: challenge
    actor: '@system-architect'
    output: architecture-review
    conditions:
    - id: after_author_stories
      kind: precondition
      type: after
      step_id: author-stories
  - id: challenge-security
    kind: challenge
    actor: '@security-expert'
    output: security-review
    conditions:
    - id: after_author_stories
      kind: precondition
      type: after
      step_id: author-stories
  - id: challenge-ux
    kind: challenge
    actor: '@ux-designer'
    output: ux-review
    conditions:
    - id: after_author_stories
      kind: precondition
      type: after
      step_id: author-stories
  - id: plan-and-gate
    kind: gate
    gate: ★ Story Gate
    actor: '@scrum-master'
    conditions:
    - id: after_challenge_sizing
      kind: precondition
      type: after
      step_id: challenge-sizing
    - id: after_challenge_testability
      kind: precondition
      type: after
      step_id: challenge-testability
    - id: after_challenge_flag
      kind: precondition
      type: after
      step_id: challenge-flag
    - id: after_challenge_security
      kind: precondition
      type: after
      step_id: challenge-security
    - id: after_challenge_ux
      kind: precondition
      type: after
      step_id: challenge-ux
