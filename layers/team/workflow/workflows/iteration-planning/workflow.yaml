workflow:
  version: 2
  id: iteration-planning
  rank: suborchestration
  kind: ceremony
  parent: scrum
  facilitator: '@scrum-master'
  skills: [iteration-planning]
  log_dir: portfolio/logs/{orchestration}/{product}/{unit_id}
  steps:
  - id: author-stories
    kind: author
    actor: '@product-owner'
    output: story
    conditions:
    - kind: precondition
      type: input
      expression: ref
      value: portfolio/{product}/features/{unit_id}.md
      id: input_unit_id_md
    - kind: precondition
      type: state
      id: feature_committed
      expression: cel
      value: status == "committed"
    - kind: precondition
      type: state
      id: child_stories_present
      expression: cel
      value: size(child_stories) >= 1
    - kind: postcondition
      type: content
      id: owner_authored_stories_committed
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.owner_authored_stories_committed) && unit.attestations.owner_authored_stories_committed
    - kind: postcondition
      type: content
      id: work_item_relations_classified
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.work_item_relations_classified) && unit.attestations.work_item_relations_classified
  - id: challenge-sizing
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: author-stories
      id: after_author_stories
    - kind: invariant
      type: authority
      id: challenger_writes_no_owner_content
      expression: instruction
      value: instructions/challenger-writes-no-owner-content.instructions.md
    - kind: postcondition
      type: challenge
      id: developer_sizing_challenge_recorded
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.developer_sizing_challenge_recorded) && unit.attestations.developer_sizing_challenge_recorded
  - id: challenge-testability
    kind: challenge
    actor: '@quality-engineer'
    output: testability-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: author-stories
      id: after_author_stories
    - kind: invariant
      type: authority
      id: challenger_writes_no_owner_content
      expression: instruction
      value: instructions/challenger-writes-no-owner-content.instructions.md
    - kind: postcondition
      type: challenge
      id: quality_engineer_testability_challenge_recorded
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.quality_engineer_testability_challenge_recorded) && unit.attestations.quality_engineer_testability_challenge_recorded
  - id: challenge-flag
    kind: challenge
    actor: '@system-architect'
    output: architecture-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: author-stories
      id: after_author_stories
    - kind: invariant
      type: authority
      id: challenger_writes_no_owner_content
      expression: instruction
      value: instructions/challenger-writes-no-owner-content.instructions.md
    - kind: postcondition
      type: challenge
      id: system_architect_story_flag_recorded
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.system_architect_story_flag_recorded) && unit.attestations.system_architect_story_flag_recorded
  - id: challenge-security
    kind: challenge
    actor: '@security-expert'
    output: security-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: author-stories
      id: after_author_stories
    - kind: invariant
      type: authority
      id: challenger_writes_no_owner_content
      expression: instruction
      value: instructions/challenger-writes-no-owner-content.instructions.md
    - kind: postcondition
      type: challenge
      id: security_story_flag_recorded
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.security_story_flag_recorded) && unit.attestations.security_story_flag_recorded
  - id: challenge-ux
    kind: challenge
    actor: '@ux-designer'
    output: ux-review
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: author-stories
      id: after_author_stories
    - kind: invariant
      type: authority
      id: challenger_writes_no_owner_content
      expression: instruction
      value: instructions/challenger-writes-no-owner-content.instructions.md
    - kind: postcondition
      type: challenge
      id: ux_challenge_recorded_or_trivial
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.ux_challenge_recorded_or_trivial) && unit.attestations.ux_challenge_recorded_or_trivial
  - id: plan-and-gate
    kind: gate
    gate: ★ Story Gate
    actor: '@scrum-master'
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: challenge-sizing
      id: after_challenge_sizing
    - kind: precondition
      type: after
      expression: ref
      value: challenge-testability
      id: after_challenge_testability
    - kind: precondition
      type: after
      expression: ref
      value: challenge-flag
      id: after_challenge_flag
    - kind: precondition
      type: after
      expression: ref
      value: challenge-security
      id: after_challenge_security
    - kind: precondition
      type: after
      expression: ref
      value: challenge-ux
      id: after_challenge_ux
    - kind: postcondition
      type: content
      id: sprint_plan_committed
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.sprint_plan_committed) && unit.attestations.sprint_plan_committed
    - kind: postcondition
      type: content
      id: driver_navigator_pairs_assigned
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.driver_navigator_pairs_assigned) && unit.attestations.driver_navigator_pairs_assigned
    - kind: postcondition
      type: transition
      id: story_gate_dor_result_per_story
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.story_gate_dor_result_per_story) && unit.attestations.story_gate_dor_result_per_story
    - kind: postcondition
      type: transition
      id: first_ready_notifies_rte_feature_in_progress
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.first_ready_notifies_rte_feature_in_progress) && unit.attestations.first_ready_notifies_rte_feature_in_progress
