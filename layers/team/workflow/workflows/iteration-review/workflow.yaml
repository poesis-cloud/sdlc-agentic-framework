workflow:
  version: 2
  id: iteration-review
  rank: suborchestration
  kind: ceremony
  parent: scrum
  facilitator: '@scrum-master'
  skills: [iteration-review]
  log_dir: portfolio/logs/{orchestration}/{product}/{unit_id}
  steps:
  - id: review
    kind: author
    actor: '@scrum-master'
    output: iteration-review
    conditions:
    - kind: precondition
      type: input
      expression: ref
      value: portfolio/{product}/features/
      id: input_features
    - kind: postcondition
      type: content
      id: increment_demoed_against_sprint_goal
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.increment_demoed_against_sprint_goal) && unit.attestations.increment_demoed_against_sprint_goal
    - kind: postcondition
      type: content
      id: product_owner_ac_confirmation_recorded
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.product_owner_ac_confirmation_recorded) && unit.attestations.product_owner_ac_confirmation_recorded
    - kind: postcondition
      type: content
      id: central_supervisor_feedback_recorded
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.central_supervisor_feedback_recorded) && unit.attestations.central_supervisor_feedback_recorded
    - kind: postcondition
      type: content
      id: feedback_routed_to_po_or_rte
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.feedback_routed_to_po_or_rte) && unit.attestations.feedback_routed_to_po_or_rte
