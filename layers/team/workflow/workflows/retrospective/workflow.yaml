workflow:
  id: retrospective
  kind: ceremony
  parent: scrum
  facilitator: '@scrum-master'
  steps:
  - id: triage
    kind: author
    actor: '@scrum-master'
    output: retro
    conditions:
    - id: input_features
      kind: precondition
      type: input
      expression: ref
      value: portfolio/{product}/features/
    - id: story_done
      kind: precondition
      type: state
      expression: cel
      value: status == "done"
    - id: sprint_scope_pain_points_root_caused
      kind: postcondition
      type: content
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.sprint_scope_pain_points_root_caused)
        && unit.attestations.sprint_scope_pain_points_root_caused
    - id: workflow_improvement_ledger_triaged
      kind: postcondition
      type: content
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.workflow_improvement_ledger_triaged)
        && unit.attestations.workflow_improvement_ledger_triaged
    - id: retro_committed
      kind: postcondition
      type: content
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.retro_committed) && unit.attestations.retro_committed
