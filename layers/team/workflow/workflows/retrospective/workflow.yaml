workflow:
  id: retrospective
  kind: ceremony
  parent: scrum
  facilitator: '@scrum-master'
  steps:
  - id: triage
    kind: author
    actor: '@scrum-master'
    output: retro
    conditions:
    - id: story_done
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: story
          schema_id: story
        set_query: story.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "done")
