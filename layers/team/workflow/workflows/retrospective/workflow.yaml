workflow:
  id: retrospective
  kind: ceremony
  parent: scrum
  facilitator: '@scrum-master'
  steps:
  - id: triage
    kind: author
    actor: '@scrum-master'
    output: retro
    conditions:
    - id: story_done
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: story
      set_predicate: unit.status == "done"
