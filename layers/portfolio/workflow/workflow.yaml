workflow:
  id: lpm
  facilitator: '@value-management-officier'
  steps:
  - id: capture-epic
    kind: delegate
    delegates_to: workflows/epic-lean-business-case
    actor: '@value-management-officier'
    conditions:
    - id: strategic_theme_present
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: epic
      set_predicate: has(unit.strategic_theme)
    - id: status_committed_funnel
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: epic
      set_predicate: unit.status == "funnel"
  - id: shape-epic
    kind: delegate
    delegates_to: workflows/epic-lean-business-case
    actor: '@value-management-officier'
    conditions:
    - id: after_capture_epic
      kind: precondition
      type: after
      step_id: capture-epic
    - id: epic_in_funnel
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: epic
      set_predicate: unit.status == "funnel"
    - id: hypothesis_and_wsjf_present
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: epic
      set_predicate: has(unit.wsjf)
    - id: status_committed_reviewing
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: epic
      set_predicate: unit.status == "reviewing"
  - id: architect-epic
    kind: delegate
    delegates_to: workflows/architectural-vision
    actor: '@value-management-officier'
    conditions:
    - id: after_shape_epic
      kind: precondition
      type: after
      step_id: shape-epic
    - id: epic_in_reviewing
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: epic
      set_predicate: unit.status == "reviewing"
    - id: status_committed_analyzing
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: epic
      set_predicate: unit.status == "analyzing"
  - id: epic-gate
    kind: gate
    gate: ★ Epic Gate
    actor: central-supervisor (Business-Owner hat)
    conditions:
    - id: after_architect_epic
      kind: precondition
      type: after
      step_id: architect-epic
    - id: epic_analyzing_refined_board_published
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: epic
      set_predicate: unit.status == "analyzing"
  - id: start-implementing
    kind: direct
    actor: '@value-management-officier'
    conditions:
    - id: after_epic_gate
      kind: precondition
      type: after
      step_id: epic-gate
    - id: status_committed_implementing
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: epic
      set_predicate: unit.status == "implementing"
  - id: epic-outcome-gate
    kind: gate
    gate: ★ Epic Outcome Gate
    actor: central-supervisor (Business-Owner hat)
    conditions:
    - id: after_start_implementing
      kind: precondition
      type: after
      step_id: start-implementing
    - id: outcome_accepted_and_cost_committed
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: epic
      set_predicate: unit.status == "done" && has(unit.cost)
