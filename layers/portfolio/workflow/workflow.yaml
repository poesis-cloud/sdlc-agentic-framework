workflow:
  id: lpm
  facilitator: "@value-management-officier"
  steps:
    - id: capture-epic
      kind: delegate
      delegates_to: workflows/epic-lean-business-case
      actor: "@value-management-officier"
      conditions:
        - { id: input_strategic_themes_md, kind: precondition, type: input, expression: ref, value: 'portfolio/strategic-themes.md' }
        - { id: raw_idea_provided, kind: precondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.raw_idea_provided) && unit.attestations.raw_idea_provided' }
        - { id: epic_owner_owns_status, kind: invariant, type: authority, expression: instruction, value: 'instructions/epic-owner-owns-status.instructions.md' }
        - { id: output_unit_id_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/epics/{unit_id}.md' }
        - { id: output_unit_id_lbc_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/epics/{unit_id}-lbc.md' }
        - { id: strategic_theme_present, kind: postcondition, type: content, expression: cel, value: 'has(unit.strategic_theme)' }
        - { id: suborchestration_returned_shaped_epic, kind: postcondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.suborchestration_returned_shaped_epic) && unit.attestations.suborchestration_returned_shaped_epic' }
        - { id: status_committed_funnel, kind: postcondition, type: transition, expression: cel, value: 'status == "funnel"' }
    - id: shape-epic
      kind: delegate
      delegates_to: workflows/epic-lean-business-case
      actor: "@value-management-officier"
      conditions:
        - { id: after_capture_epic, kind: precondition, type: after, expression: ref, value: 'capture-epic' }
        - { id: input_unit_id_md, kind: precondition, type: input, expression: ref, value: 'portfolio/epics/{unit_id}.md' }
        - { id: input_unit_id_lbc_md, kind: precondition, type: input, expression: ref, value: 'portfolio/epics/{unit_id}-lbc.md' }
        - { id: epic_in_funnel, kind: precondition, type: state, expression: cel, value: 'status == "funnel"' }
        - { id: epic_owner_owns_status, kind: invariant, type: authority, expression: instruction, value: 'instructions/epic-owner-owns-status.instructions.md' }
        - { id: output_unit_id_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/epics/{unit_id}.md' }
        - { id: output_unit_id_lbc_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/epics/{unit_id}-lbc.md' }
        - { id: hypothesis_and_wsjf_present, kind: postcondition, type: content, expression: cel, value: 'has(unit.wsjf)' }
        - { id: status_committed_reviewing, kind: postcondition, type: transition, expression: cel, value: 'status == "reviewing"' }
    - id: architect-epic
      kind: delegate
      delegates_to: workflows/architectural-vision
      actor: "@value-management-officier"
      conditions:
        - { id: after_shape_epic, kind: precondition, type: after, expression: ref, value: 'shape-epic' }
        - { id: input_unit_id_md, kind: precondition, type: input, expression: ref, value: 'portfolio/epics/{unit_id}.md' }
        - { id: epic_in_reviewing, kind: precondition, type: state, expression: cel, value: 'status == "reviewing"' }
        - { id: no_replay_triggering_enabler_seeded, kind: precondition, type: state, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.no_replay_triggering_enabler_seeded) && unit.attestations.no_replay_triggering_enabler_seeded' }
        - { id: epic_owner_owns_status, kind: invariant, type: authority, expression: instruction, value: 'instructions/epic-owner-owns-status.instructions.md' }
        - { id: output_unit_id_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/epics/{unit_id}.md' }
        - { id: output_runway_register_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/architecture/runway-register.md' }
        - { id: runway_and_nfr_backbone_present, kind: postcondition, type: content, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.runway_and_nfr_backbone_present) && unit.attestations.runway_and_nfr_backbone_present' }
        - { id: status_committed_analyzing, kind: postcondition, type: transition, expression: cel, value: 'status == "analyzing"' }
    - id: epic-gate
      kind: gate
      gate: ★ Epic Gate
      actor: central-supervisor (Business-Owner hat)
      conditions:
        - { id: after_architect_epic, kind: precondition, type: after, expression: ref, value: 'architect-epic' }
        - { id: input_unit_id_md, kind: precondition, type: input, expression: ref, value: 'portfolio/epics/{unit_id}.md' }
        - { id: input_unit_id_lbc_md, kind: precondition, type: input, expression: ref, value: 'portfolio/epics/{unit_id}-lbc.md' }
        - { id: input_portfolio_md, kind: precondition, type: input, expression: ref, value: 'portfolio/kanban/portfolio.md' }
        - { id: epic_analyzing_refined_board_published, kind: precondition, type: state, expression: cel, value: 'status == "analyzing"' }
        - { id: no_open_blocking_items, kind: precondition, type: state, expression: cel, value: 'open_items_clear' }
        - { id: human_decides_gate, kind: invariant, type: authority, expression: instruction, value: 'instructions/human-decides-gate.instructions.md' }
        - { id: output_gate_decisions_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/gate-decisions.md' }
        - { id: gate_verdict_recorded, kind: postcondition, type: transition, expression: cel, value: 'has(unit.attestations) && has(unit.attestations.gate_verdict_recorded) && unit.attestations.gate_verdict_recorded' }
    - id: start-implementing
      kind: direct
      actor: "@value-management-officier"
      conditions:
        - { id: after_epic_gate, kind: precondition, type: after, expression: ref, value: 'epic-gate' }
        - { id: input_features, kind: precondition, type: input, expression: ref, value: 'portfolio/{product}/features/' }
        - { id: first_child_feature_funnel, kind: precondition, type: state, expression: cel, value: 'size(child_features) >= 1' }
        - { id: epic_owner_owns_status, kind: invariant, type: authority, expression: instruction, value: 'instructions/epic-owner-owns-status.instructions.md' }
        - { id: output_portfolio_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/kanban/portfolio.md' }
        - { id: status_committed_implementing, kind: postcondition, type: transition, expression: cel, value: 'status == "implementing"' }
    - id: epic-outcome-gate
      kind: gate
      gate: ★ Epic Outcome Gate
      actor: central-supervisor (Business-Owner hat)
      conditions:
        - { id: after_start_implementing, kind: precondition, type: after, expression: ref, value: 'start-implementing' }
        - { id: input_features, kind: precondition, type: input, expression: ref, value: 'portfolio/{product}/features/' }
        - { id: input_unit_id_md, kind: precondition, type: input, expression: ref, value: 'portfolio/epics/{unit_id}.md' }
        - { id: last_child_feature_done, kind: precondition, type: state, expression: cel, value: 'size(child_features) >= 1 && child_features.all(c, c.status == "done")' }
        - { id: human_decides_gate, kind: invariant, type: authority, expression: instruction, value: 'instructions/human-decides-gate.instructions.md' }
        - { id: output_gate_decisions_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/gate-decisions.md' }
        - { id: output_unit_id_md, kind: postcondition, type: output, expression: ref, value: 'portfolio/epics/{unit_id}.md' }
        - { id: outcome_accepted_and_cost_committed, kind: postcondition, type: transition, expression: cel, value: 'status == "done" && has(unit.cost)' }
        - { id: epic_cost_snapshot_measured_once_from_logs, kind: invariant, type: content, expression: instruction, value: 'instructions/epic-cost-snapshot-measured-once-from-logs.instructions.md' }
