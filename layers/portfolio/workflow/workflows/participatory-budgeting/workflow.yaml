workflow:
  id: participatory-budgeting
  kind: ceremony
  parent: lpm
  facilitator: '@value-management-officier'
  steps:
  - id: arguments-value
    kind: challenge
    actor: '@business-owner'
    output: value-review
  - id: arguments-split
    kind: challenge
    actor: '@enterprise-architect'
    output: architecture-review
  - id: arguments-guardrails
    kind: challenge
    actor: '@security-expert'
    output: security-review
  - id: commit
    kind: commit
    actor: central-supervisor (Business-Owner hat)
    output: budget-allocation
    conditions:
    - id: after_arguments_value
      kind: precondition
      type: after
      step_id: arguments-value
    - id: after_arguments_split
      kind: precondition
      type: after
      step_id: arguments-split
    - id: after_arguments_guardrails
      kind: precondition
      type: after
      step_id: arguments-guardrails
