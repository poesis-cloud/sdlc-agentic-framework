workflow:
  id: strategic-portfolio-review
  kind: ceremony
  parent: lpm
  facilitator: '@value-management-officier'
  steps:
  - id: rerank
    kind: author
    actor: '@business-owner'
    output: strategic-themes
  - id: challenge-runway
    kind: challenge
    actor: '@enterprise-architect'
    output: architecture-review
    conditions:
    - id: after_rerank
      kind: precondition
      type: after
      step_id: rerank
  - id: challenge-security
    kind: challenge
    actor: '@security-expert'
    output: security-review
    conditions:
    - id: after_rerank
      kind: precondition
      type: after
      step_id: rerank
  - id: owner-rewrite
    kind: author
    actor: '@business-owner'
    output: strategic-themes
    conditions:
    - id: after_challenge_runway
      kind: precondition
      type: after
      step_id: challenge-runway
    - id: after_challenge_security
      kind: precondition
      type: after
      step_id: challenge-security
  - id: decide
    kind: commit
    actor: central-supervisor (Business-Owner hat)
    output: portfolio-review-decision
    conditions:
    - id: after_owner_rewrite
      kind: precondition
      type: after
      step_id: owner-rewrite
