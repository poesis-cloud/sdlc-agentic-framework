workflow:
  id: feature-backlog-refinement
  kind: ceremony
  parent: art
  facilitator: '@release-train-engineer'
  steps:
  - id: draft-business
    kind: author
    actor: '@product-manager'
    output: feature
    conditions:
    - id: feature_in_funnel
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: feature
          schema_id: feature
        set_query: feature.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "funnel")
  - id: draft-enabler
    kind: author
    actor: '@system-architect'
    output: feature-enabler
  - id: challenge-feasibility
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - id: after_draft_business
      kind: precondition
      type: after
      step_id: draft-business
    - id: after_draft_enabler
      kind: precondition
      type: after
      step_id: draft-enabler
  - id: challenge-testability
    kind: challenge
    actor: '@quality-engineer'
    output: testability-review
    conditions:
    - id: after_draft_business
      kind: precondition
      type: after
      step_id: draft-business
    - id: after_draft_enabler
      kind: precondition
      type: after
      step_id: draft-enabler
  - id: challenge-architecture
    kind: challenge
    actor: '@system-architect'
    output: architecture-review
    conditions:
    - id: after_draft_business
      kind: precondition
      type: after
      step_id: draft-business
    - id: after_draft_enabler
      kind: precondition
      type: after
      step_id: draft-enabler
  - id: challenge-security
    kind: challenge
    actor: '@security-expert'
    output: security-review
    conditions:
    - id: after_draft_business
      kind: precondition
      type: after
      step_id: draft-business
    - id: after_draft_enabler
      kind: precondition
      type: after
      step_id: draft-enabler
  - id: challenge-ux
    kind: challenge
    actor: '@ux-designer'
    output: ux-review
    conditions:
    - id: after_draft_business
      kind: precondition
      type: after
      step_id: draft-business
    - id: after_draft_enabler
      kind: precondition
      type: after
      step_id: draft-enabler
  - id: owner-rewrite-business
    kind: author
    actor: '@product-manager'
    output: feature
    conditions:
    - id: after_challenge_feasibility
      kind: precondition
      type: after
      step_id: challenge-feasibility
    - id: after_challenge_testability
      kind: precondition
      type: after
      step_id: challenge-testability
    - id: after_challenge_architecture
      kind: precondition
      type: after
      step_id: challenge-architecture
    - id: after_challenge_security
      kind: precondition
      type: after
      step_id: challenge-security
    - id: after_challenge_ux
      kind: precondition
      type: after
      step_id: challenge-ux
    - id: ac_and_wsjf_present
      kind: postcondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: feature
          schema_id: feature
        set_query: feature.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, has(x.wsjf))
  - id: owner-rewrite-enabler
    kind: author
    actor: '@system-architect'
    output: feature-enabler
    conditions:
    - id: after_challenge_feasibility
      kind: precondition
      type: after
      step_id: challenge-feasibility
    - id: after_challenge_testability
      kind: precondition
      type: after
      step_id: challenge-testability
    - id: after_challenge_architecture
      kind: precondition
      type: after
      step_id: challenge-architecture
    - id: after_challenge_security
      kind: precondition
      type: after
      step_id: challenge-security
    - id: after_challenge_ux
      kind: precondition
      type: after
      step_id: challenge-ux
    - id: ac_and_wsjf_present
      kind: postcondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: feature
          schema_id: feature
        set_query: feature.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, has(x.wsjf))
