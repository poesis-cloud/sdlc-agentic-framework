workflow:
  id: system-demo
  kind: ceremony
  parent: art
  facilitator: '@release-train-engineer'
  steps:
  - id: demo
    kind: verify
    actor: '@quality-engineer'
    output: qa-signoff
    conditions:
    - id: feature_in_progress
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: feature
          schema_id: feature
        set_query: feature.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "in-progress")
  - id: verify-security
    kind: verify
    actor: '@security-expert'
    output: security-review
  - id: verify-operability
    kind: verify
    actor: '@operator'
    output: operability-review
  - id: demo-gate
    kind: gate
    actor: central-supervisor
    conditions:
    - id: after_demo
      kind: precondition
      type: after
      step_id: demo
    - id: after_verify_security
      kind: precondition
      type: after
      step_id: verify-security
    - id: after_verify_operability
      kind: precondition
      type: after
      step_id: verify-operability
    - id: feature_cost_committed_once_on_accept
      kind: postcondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: feature
          schema_id: feature
        set_query: feature.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, has(x.cost))
