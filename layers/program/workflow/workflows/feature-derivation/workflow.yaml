workflow:
  id: feature-derivation
  kind: ceremony
  parent: art
  facilitator: '@release-train-engineer'
  steps:
  - id: derive-business
    kind: author
    actor: '@product-manager'
    output: feature
    conditions:
    - id: parent_epic_present
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: has(unit.parent_epic)
    - id: feature_typed_business_or_enabler
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: has(unit.type) && (unit.type == "business" || unit.type == "enabler")
  - id: derive-enabler
    kind: author
    actor: '@system-architect'
    output: feature-enabler
    conditions:
    - id: after_derive_business
      kind: precondition
      type: after
      step_id: derive-business
    - id: parent_epic_present
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: has(unit.parent_epic)
    - id: feature_typed_business_or_enabler
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: has(unit.type) && (unit.type == "business" || unit.type == "enabler")
