workflow:
  id: feature-derivation
  kind: ceremony
  parent: art
  facilitator: "@release-train-engineer"
  steps:
    - id: derive-business
      kind: author
      actor: "@product-manager"
      output: feature
      conditions:
        - {
            id: input_epics,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/epics/",
          }
        - {
            id: approved_epic_provided,
            kind: precondition,
            type: content,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.approved_epic_provided) && unit.attestations.approved_epic_provided",
          }
        - {
            id: only_owner_writes_business_feature,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/only-owner-writes-business-feature.instructions.md",
          }
        - {
            id: facilitator_authors_no_owner_content,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/facilitator-authors-no-owner-content.instructions.md",
          }
        - {
            id: parent_epic_present,
            kind: postcondition,
            type: content,
            expression: cel,
            value: "has(unit.parent_epic)",
          }
        - {
            id: feature_typed_business_or_enabler,
            kind: postcondition,
            type: content,
            expression: cel,
            value: 'has(unit.type) && (unit.type == "business" || unit.type == "enabler")',
          }
    - id: derive-enabler
      kind: author
      actor: "@system-architect"
      output: feature-enabler
      conditions:
        - {
            id: input_epics,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/epics/",
          }
        - {
            id: approved_epic_provided,
            kind: precondition,
            type: content,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.approved_epic_provided) && unit.attestations.approved_epic_provided",
          }
        - {
            id: after_derive_business,
            kind: precondition,
            type: after,
            expression: ref,
            value: "derive-business",
          }
        - {
            id: only_owner_writes_enabler_feature,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/only-owner-writes-enabler-feature.instructions.md",
          }
        - {
            id: facilitator_authors_no_owner_content,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/facilitator-authors-no-owner-content.instructions.md",
          }
        - {
            id: parent_epic_present,
            kind: postcondition,
            type: content,
            expression: cel,
            value: "has(unit.parent_epic)",
          }
        - {
            id: feature_typed_business_or_enabler,
            kind: postcondition,
            type: content,
            expression: cel,
            value: 'has(unit.type) && (unit.type == "business" || unit.type == "enabler")',
          }
