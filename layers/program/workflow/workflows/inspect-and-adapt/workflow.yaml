workflow:
  version: 2
  id: inspect-and-adapt
  rank: suborchestration
  kind: ceremony
  parent: art
  facilitator: '@release-train-engineer'
  skills: [inspect-and-adapt]
  log_dir: portfolio/logs/{orchestration}/{product}/{unit_id}
  steps:
  - id: problem-solve
    kind: author
    actor: '@product-manager'
    output: inspect-adapt-findings
    conditions:
    - kind: precondition
      type: input
      expression: ref
      value: portfolio/{product}/features/
      id: input_features
    - kind: postcondition
      type: content
      id: pain_points_recorded
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.pain_points_recorded) && unit.attestations.pain_points_recorded
    - kind: postcondition
      type: content
      id: top_systemic_problems_root_caused
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.top_systemic_problems_root_caused) && unit.attestations.top_systemic_problems_root_caused
    - kind: postcondition
      type: content
      id: workflow_improvement_ledger_triaged
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.workflow_improvement_ledger_triaged) && unit.attestations.workflow_improvement_ledger_triaged
  - id: record
    kind: commit
    actor: '@release-train-engineer'
    output: inspect-adapt-document
    conditions:
    - kind: precondition
      type: after
      expression: ref
      value: problem-solve
      id: after_problem_solve
    - kind: postcondition
      type: content
      id: inspect_adapt_document_committed
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.inspect_adapt_document_committed) && unit.attestations.inspect_adapt_document_committed
