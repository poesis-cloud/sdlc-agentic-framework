workflow:
  id: pi-planning
  kind: ceremony
  parent: art
  facilitator: '@release-train-engineer'
  steps:
  - id: confirm-intent
    kind: author
    actor: '@product-manager'
    output: feature
    conditions:
    - id: feature_ready
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "ready"
  - id: confirm-runway
    kind: author
    actor: '@system-architect'
    output: runway-register
  - id: confirm-priority
    kind: author
    actor: '@business-owner'
    output: value-review
  - id: challenge-feasibility
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - id: after_confirm_intent
      kind: precondition
      type: after
      step_id: confirm-intent
    - id: after_confirm_runway
      kind: precondition
      type: after
      step_id: confirm-runway
    - id: after_confirm_priority
      kind: precondition
      type: after
      step_id: confirm-priority
  - id: challenge-testability
    kind: challenge
    actor: '@quality-engineer'
    output: testability-review
    conditions:
    - id: after_confirm_intent
      kind: precondition
      type: after
      step_id: confirm-intent
    - id: after_confirm_runway
      kind: precondition
      type: after
      step_id: confirm-runway
    - id: after_confirm_priority
      kind: precondition
      type: after
      step_id: confirm-priority
  - id: challenge-nfr-security
    kind: challenge
    actor: '@security-expert'
    output: security-review
    conditions:
    - id: after_confirm_intent
      kind: precondition
      type: after
      step_id: confirm-intent
    - id: after_confirm_runway
      kind: precondition
      type: after
      step_id: confirm-runway
    - id: after_confirm_priority
      kind: precondition
      type: after
      step_id: confirm-priority
  - id: challenge-nfr-operability
    kind: challenge
    actor: '@operator'
    output: operability-review
    conditions:
    - id: after_confirm_intent
      kind: precondition
      type: after
      step_id: confirm-intent
    - id: after_confirm_runway
      kind: precondition
      type: after
      step_id: confirm-runway
    - id: after_confirm_priority
      kind: precondition
      type: after
      step_id: confirm-priority
  - id: challenge-ux
    kind: challenge
    actor: '@ux-designer'
    output: ux-review
    conditions:
    - id: after_confirm_intent
      kind: precondition
      type: after
      step_id: confirm-intent
    - id: after_confirm_runway
      kind: precondition
      type: after
      step_id: confirm-runway
    - id: after_confirm_priority
      kind: precondition
      type: after
      step_id: confirm-priority
  - id: commit
    kind: commit
    actor: '@release-train-engineer'
    output: program-kanban
    conditions:
    - id: after_challenge_feasibility
      kind: precondition
      type: after
      step_id: challenge-feasibility
    - id: after_challenge_testability
      kind: precondition
      type: after
      step_id: challenge-testability
    - id: after_challenge_nfr_security
      kind: precondition
      type: after
      step_id: challenge-nfr-security
    - id: after_challenge_nfr_operability
      kind: precondition
      type: after
      step_id: challenge-nfr-operability
    - id: after_challenge_ux
      kind: precondition
      type: after
      step_id: challenge-ux
