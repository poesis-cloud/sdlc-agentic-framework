workflow:
  id: architectural-runway-extension
  kind: practice
  parent: art
  cdp_stage: continuous-exploration
  facilitator: '@release-train-engineer'
  steps:
  - id: inventory
    kind: author
    actor: '@system-architect'
    output: architecture-decision-inventory
    conditions:
    - id: input_unit_id_md
      kind: precondition
      type: input
      expression: ref
      value: portfolio/{product}/features/{unit_id}.md
    - id: feature_arch_pending_structurant
      kind: precondition
      type: state
      expression: cel
      value: status == "arch-pending" && has(unit.structurant)
    - id: decision_inventory_committed
      kind: postcondition
      type: content
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.decision_inventory_committed)
        && unit.attestations.decision_inventory_committed
    - id: adr_or_inventory_waiver_for_each_decision_unit
      kind: postcondition
      type: content
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.adr_or_inventory_waiver_for_each_decision_unit)
        && unit.attestations.adr_or_inventory_waiver_for_each_decision_unit
  - id: challenge-security
    kind: challenge
    actor: '@security-expert'
    output: security-review
    conditions:
    - id: after_inventory
      kind: precondition
      type: after
      step_id: inventory
    - id: security_trust_boundary_challenge_recorded
      kind: postcondition
      type: challenge
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.security_trust_boundary_challenge_recorded)
        && unit.attestations.security_trust_boundary_challenge_recorded
  - id: challenge-operability
    kind: challenge
    actor: '@operator'
    output: operability-review
    conditions:
    - id: after_inventory
      kind: precondition
      type: after
      step_id: inventory
    - id: operator_operability_challenge_recorded
      kind: postcondition
      type: challenge
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.operator_operability_challenge_recorded)
        && unit.attestations.operator_operability_challenge_recorded
  - id: challenge-feasibility
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - id: after_inventory
      kind: precondition
      type: after
      step_id: inventory
    - id: developer_feasibility_challenge_recorded
      kind: postcondition
      type: challenge
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.developer_feasibility_challenge_recorded)
        && unit.attestations.developer_feasibility_challenge_recorded
  - id: owner-rewrite
    kind: author
    actor: '@system-architect'
    output: runway-register
    conditions:
    - id: after_challenge_security
      kind: precondition
      type: after
      step_id: challenge-security
    - id: after_challenge_operability
      kind: precondition
      type: after
      step_id: challenge-operability
    - id: after_challenge_feasibility
      kind: precondition
      type: after
      step_id: challenge-feasibility
    - id: owner_rewrite_completed_after_challenge
      kind: postcondition
      type: content
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.owner_rewrite_completed_after_challenge)
        && unit.attestations.owner_rewrite_completed_after_challenge
    - id: runway_gaps_classified_and_nfr_updates_committed_or_waived
      kind: postcondition
      type: content
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.runway_gaps_classified_and_nfr_updates_committed_or_waived)
        && unit.attestations.runway_gaps_classified_and_nfr_updates_committed_or_waived
    - id: no_open_blocking_items
      kind: postcondition
      type: state
      expression: cel
      value: open_items_clear
  - id: stage-gate
    kind: gate
    gate: ★ Architecture Gate
    actor: '@release-train-engineer'
    conditions:
    - id: after_owner_rewrite
      kind: precondition
      type: after
      step_id: owner-rewrite
    - id: architecture_gate_packet_ready
      kind: postcondition
      type: state
      expression: cel
      value: gate_packet_ok
    - id: replay_on_late_enabler_handled
      kind: postcondition
      type: consistency
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.replay_on_late_enabler_handled)
        && unit.attestations.replay_on_late_enabler_handled
    - id: unresolved_gate_questions_recorded
      kind: postcondition
      type: content
      expression: cel
      value: has(unit.attestations) && has(unit.attestations.unresolved_gate_questions_recorded)
        && unit.attestations.unresolved_gate_questions_recorded
