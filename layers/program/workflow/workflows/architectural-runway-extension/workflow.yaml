workflow:
  id: architectural-runway-extension
  kind: practice
  parent: art
  facilitator: '@release-train-engineer'
  steps:
  - id: inventory
    kind: author
    actor: '@system-architect'
    output: architecture-decision-inventory
    conditions:
    - id: feature_arch_pending_structurant
      kind: precondition
      type: state
      set_selector:
        set_type: artifact
        artifact_types:
        - alias: feature
          schema_id: feature
        set_query: feature.filter(x, x.id == unit_id)
      set_predicate: selected.all(x, x.status == "arch-pending" && has(x.structurant))
  - id: challenge-security
    kind: challenge
    actor: '@security-expert'
    output: security-review
    conditions:
    - id: after_inventory
      kind: precondition
      type: after
      step_id: inventory
  - id: challenge-operability
    kind: challenge
    actor: '@operator'
    output: operability-review
    conditions:
    - id: after_inventory
      kind: precondition
      type: after
      step_id: inventory
  - id: challenge-feasibility
    kind: challenge
    actor: '@developer'
    output: feasibility-review
    conditions:
    - id: after_inventory
      kind: precondition
      type: after
      step_id: inventory
  - id: owner-rewrite
    kind: author
    actor: '@system-architect'
    output: runway-register
    conditions:
    - id: after_challenge_security
      kind: precondition
      type: after
      step_id: challenge-security
    - id: after_challenge_operability
      kind: precondition
      type: after
      step_id: challenge-operability
    - id: after_challenge_feasibility
      kind: precondition
      type: after
      step_id: challenge-feasibility
  - id: stage-gate
    kind: gate
    gate: ★ Architecture Gate
    actor: '@release-train-engineer'
    conditions:
    - id: after_owner_rewrite
      kind: precondition
      type: after
      step_id: owner-rewrite
