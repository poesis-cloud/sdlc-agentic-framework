workflow:
  id: art
  facilitator: '@release-train-engineer'
  steps:
  - id: derive-feature
    kind: delegate
    delegates_to: workflows/feature-derivation
    actor: '@release-train-engineer'
    conditions:
    - id: parent_epic_present
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: has(unit.parent_epic)
    - id: feature_typed_business_or_enabler
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: has(unit.type) && (unit.type == "business" || unit.type == "enabler")
    - id: status_committed_funnel
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "funnel"
  - id: refine-feature
    kind: delegate
    delegates_to: workflows/feature-backlog-refinement
    actor: '@release-train-engineer'
    conditions:
    - id: after_derive_feature
      kind: precondition
      type: after
      step_id: derive-feature
    - id: feature_in_funnel
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "funnel"
    - id: ac_and_wsjf_present
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: has(unit.wsjf)
    - id: status_committed_refined
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "refined"
  - id: feature-gate
    kind: gate
    gate: ★ Feature Gate
    actor: '@release-train-engineer'
    conditions:
    - id: after_refine_feature
      kind: precondition
      type: after
      step_id: refine-feature
    - id: feature_refined
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "refined"
  - id: extend-runway
    kind: delegate
    delegates_to: workflows/architectural-runway-extension
    actor: '@release-train-engineer'
    conditions:
    - id: after_feature_gate
      kind: precondition
      type: after
      step_id: feature-gate
    - id: feature_is_structurant_else_trivial
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: '!(has(unit.structurant) && unit.structurant) || unit.status
        == "arch-pending"'
  - id: architecture-gate
    kind: gate
    gate: ★ Architecture Gate
    actor: central-supervisor (Enterprise-Architect hat)
    conditions:
    - id: after_extend_runway
      kind: precondition
      type: after
      step_id: extend-runway
  - id: plan-pi
    kind: delegate
    delegates_to: workflows/pi-planning
    actor: '@release-train-engineer'
    conditions:
    - id: after_architecture_gate
      kind: precondition
      type: after
      step_id: architecture-gate
    - id: feature_ready
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "ready"
    - id: status_committed_committed
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "committed"
  - id: start-implementing
    kind: direct
    actor: '@release-train-engineer'
    conditions:
    - id: after_plan_pi
      kind: precondition
      type: after
      step_id: plan-pi
    - id: feature_committed
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "committed"
    - id: status_committed_in_progress
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "in-progress"
  - id: pr-gate
    kind: gate
    gate: ★ PR Gate
    actor: central-supervisor (Business-Owner hat)
    conditions:
    - id: after_start_implementing
      kind: precondition
      type: after
      step_id: start-implementing
  - id: demo
    kind: delegate
    delegates_to: workflows/system-demo
    actor: '@release-train-engineer'
    conditions:
    - id: after_pr_gate
      kind: precondition
      type: after
      step_id: pr-gate
    - id: feature_in_progress
      kind: precondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "in-progress"
  - id: demo-gate
    kind: gate
    gate: ★ Demo Gate
    actor: central-supervisor (Business-Owner hat)
    conditions:
    - id: after_demo
      kind: precondition
      type: after
      step_id: demo
    - id: demo_accepted_cost_committed_and_vmo_notified
      kind: postcondition
      type: state
      set_selector:
        set_type: unit
        schema_id: feature
      set_predicate: unit.status == "done" && has(unit.cost)
