workflow:
  id: art
  facilitator: "@release-train-engineer"

  steps:
    - id: derive-feature
      kind: delegate
      delegates_to: workflows/feature-derivation
      actor: "@release-train-engineer"
      conditions:
        - {
            id: input_epics,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/epics/",
          }
        - {
            id: approved_epic_provided,
            kind: precondition,
            type: content,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.approved_epic_provided) && unit.attestations.approved_epic_provided",
          }
        - {
            id: feature_owner_owns_status,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/feature-owner-owns-status.instructions.md",
          }
        - {
            id: output_unit_id_md,
            kind: postcondition,
            type: output,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: parent_epic_present,
            kind: postcondition,
            type: content,
            expression: cel,
            value: "has(unit.parent_epic)",
          }
        - {
            id: feature_typed_business_or_enabler,
            kind: postcondition,
            type: content,
            expression: cel,
            value: 'has(unit.type) && (unit.type == "business" || unit.type == "enabler")',
          }
        - {
            id: status_committed_funnel,
            kind: postcondition,
            type: transition,
            expression: cel,
            value: 'status == "funnel"',
          }

    - id: refine-feature
      kind: delegate
      delegates_to: workflows/feature-backlog-refinement
      actor: "@release-train-engineer"
      conditions:
        - {
            id: after_derive_feature,
            kind: precondition,
            type: after,
            expression: ref,
            value: "derive-feature",
          }
        - {
            id: input_unit_id_md,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: feature_in_funnel,
            kind: precondition,
            type: state,
            expression: cel,
            value: 'status == "funnel"',
          }
        - {
            id: feature_owner_owns_status,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/feature-owner-owns-status.instructions.md",
          }
        - {
            id: output_unit_id_md,
            kind: postcondition,
            type: output,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: ac_and_wsjf_present,
            kind: postcondition,
            type: content,
            expression: cel,
            value: "has(unit.wsjf)",
          }
        - {
            id: refinement_roster_exercised,
            kind: postcondition,
            type: content,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.refinement_roster_exercised) && unit.attestations.refinement_roster_exercised",
          }
        - {
            id: status_committed_refined,
            kind: postcondition,
            type: transition,
            expression: cel,
            value: 'status == "refined"',
          }

    - id: feature-gate
      kind: gate
      gate: ★ Feature Gate
      actor: "@release-train-engineer"
      conditions:
        - {
            id: after_refine_feature,
            kind: precondition,
            type: after,
            expression: ref,
            value: "refine-feature",
          }
        - {
            id: input_unit_id_md,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: input_program_md,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/{product}/kanban/program.md",
          }
        - {
            id: feature_refined,
            kind: precondition,
            type: state,
            expression: cel,
            value: 'status == "refined"',
          }
        - {
            id: no_open_blocking_items,
            kind: precondition,
            type: state,
            expression: cel,
            value: "open_items_clear",
          }
        - {
            id: feature_gate_rte_run_escalate_if_structurant,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/feature-gate-rte-run-escalate-if-structurant.instructions.md",
          }
        - {
            id: output_gate_decisions_md,
            kind: postcondition,
            type: output,
            expression: ref,
            value: "portfolio/gate-decisions.md",
          }
        - {
            id: feature_gate_verdict_recorded,
            kind: postcondition,
            type: transition,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.feature_gate_verdict_recorded) && unit.attestations.feature_gate_verdict_recorded",
          }

    - id: extend-runway
      kind: delegate
      delegates_to: workflows/architectural-runway-extension
      actor: "@release-train-engineer"
      conditions:
        - {
            id: after_feature_gate,
            kind: precondition,
            type: after,
            expression: ref,
            value: "feature-gate",
          }
        - {
            id: input_unit_id_md,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: feature_is_structurant_else_trivial,
            kind: precondition,
            type: state,
            expression: cel,
            value: '!(has(unit.structurant) && unit.structurant) || status == "arch-pending"',
          }
        - {
            id: feature_owner_owns_status_architecture_stays_sa_owned,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/feature-owner-owns-status-architecture-stays-sa-owned.instructions.md",
          }
        - {
            id: output_unit_id_md,
            kind: postcondition,
            type: output,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: architecture_pass_packet_committed,
            kind: postcondition,
            type: content,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.architecture_pass_packet_committed) && unit.attestations.architecture_pass_packet_committed",
          }

    - id: architecture-gate
      kind: gate
      gate: ★ Architecture Gate
      actor: central-supervisor (Enterprise-Architect hat)
      conditions:
        - {
            id: after_extend_runway,
            kind: precondition,
            type: after,
            expression: ref,
            value: "extend-runway",
          }
        - {
            id: input_unit_id_md,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: inventory_gate_complete_else_trivial,
            kind: precondition,
            type: state,
            expression: cel,
            value: "inventory_complete",
          }
        - {
            id: no_open_blocking_items,
            kind: precondition,
            type: state,
            expression: cel,
            value: "open_items_clear",
          }
        - {
            id: human_decides_gate,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/human-decides-gate.instructions.md",
          }
        - {
            id: output_gate_decisions_md,
            kind: postcondition,
            type: output,
            expression: ref,
            value: "portfolio/gate-decisions.md",
          }
        - {
            id: architecture_gate_verdict_recorded,
            kind: postcondition,
            type: transition,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.architecture_gate_verdict_recorded) && unit.attestations.architecture_gate_verdict_recorded",
          }

    - id: plan-pi
      kind: delegate
      delegates_to: workflows/pi-planning
      actor: "@release-train-engineer"
      conditions:
        - {
            id: after_architecture_gate,
            kind: precondition,
            type: after,
            expression: ref,
            value: "architecture-gate",
          }
        - {
            id: input_unit_id_md,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: feature_ready,
            kind: precondition,
            type: state,
            expression: cel,
            value: 'status == "ready"',
          }
        - {
            id: dependencies_met,
            kind: precondition,
            type: state,
            expression: cel,
            value: "depends_on_met",
          }
        - {
            id: feature_owner_owns_status,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/feature-owner-owns-status.instructions.md",
          }
        - {
            id: output_program_md,
            kind: postcondition,
            type: output,
            expression: ref,
            value: "portfolio/{product}/kanban/program.md",
          }
        - {
            id: pi_objectives_risks_and_dispatch_recorded,
            kind: postcondition,
            type: content,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.pi_objectives_risks_and_dispatch_recorded) && unit.attestations.pi_objectives_risks_and_dispatch_recorded",
          }
        - {
            id: status_committed_committed,
            kind: postcondition,
            type: transition,
            expression: cel,
            value: 'status == "committed"',
          }

    - id: start-implementing
      kind: direct
      actor: "@release-train-engineer"
      conditions:
        - {
            id: after_plan_pi,
            kind: precondition,
            type: after,
            expression: ref,
            value: "plan-pi",
          }
        - {
            id: input_unit_id_md,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: feature_committed,
            kind: precondition,
            type: state,
            expression: cel,
            value: 'status == "committed"',
          }
        - {
            id: first_child_story_ready,
            kind: precondition,
            type: state,
            expression: cel,
            value: "size(child_stories) >= 1",
          }
        - {
            id: feature_owner_owns_status,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/feature-owner-owns-status.instructions.md",
          }
        - {
            id: output_program_md,
            kind: postcondition,
            type: output,
            expression: ref,
            value: "portfolio/{product}/kanban/program.md",
          }
        - {
            id: status_committed_in_progress,
            kind: postcondition,
            type: transition,
            expression: cel,
            value: 'status == "in-progress"',
          }

    - id: pr-gate
      kind: gate
      gate: ★ PR Gate
      actor: central-supervisor (Business-Owner hat)
      conditions:
        - {
            id: after_start_implementing,
            kind: precondition,
            type: after,
            expression: ref,
            value: "start-implementing",
          }
        - {
            id: input_unit_id_md,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: child_story_awaiting_pr_staged,
            kind: precondition,
            type: state,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.child_story_awaiting_pr_staged) && unit.attestations.child_story_awaiting_pr_staged",
          }
        - {
            id: human_decides_gate_rte_merges,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/human-decides-gate-rte-merges.instructions.md",
          }
        - {
            id: output_gate_decisions_md,
            kind: postcondition,
            type: output,
            expression: ref,
            value: "portfolio/gate-decisions.md",
          }
        - {
            id: child_story_merged_and_rolled_up,
            kind: postcondition,
            type: transition,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.child_story_merged_and_rolled_up) && unit.attestations.child_story_merged_and_rolled_up",
          }

    - id: demo
      kind: delegate
      delegates_to: workflows/system-demo
      actor: "@release-train-engineer"
      conditions:
        - {
            id: after_pr_gate,
            kind: precondition,
            type: after,
            expression: ref,
            value: "pr-gate",
          }
        - {
            id: input_unit_id_md,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: feature_in_progress,
            kind: precondition,
            type: state,
            expression: cel,
            value: 'status == "in-progress"',
          }
        - {
            id: all_child_stories_done,
            kind: precondition,
            type: state,
            expression: cel,
            value: "all_children_done",
          }
        - {
            id: child_qa_signoffs_present,
            kind: precondition,
            type: state,
            expression: cel,
            value: "child_qa_signoffs_present",
          }
        - {
            id: feature_owner_owns_status,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/feature-owner-owns-status.instructions.md",
          }
        - {
            id: increment_staged_for_demo_gate,
            kind: postcondition,
            type: content,
            expression: cel,
            value: "has(unit.attestations) && has(unit.attestations.increment_staged_for_demo_gate) && unit.attestations.increment_staged_for_demo_gate",
          }

    - id: demo-gate
      kind: gate
      gate: ★ Demo Gate
      actor: central-supervisor (Business-Owner hat)
      conditions:
        - {
            id: after_demo,
            kind: precondition,
            type: after,
            expression: ref,
            value: "demo",
          }
        - {
            id: input_unit_id_md,
            kind: precondition,
            type: input,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: feature_in_progress_children_done,
            kind: precondition,
            type: state,
            expression: cel,
            value: 'status == "in-progress" && all_children_done',
          }
        - {
            id: gate_packet_ok,
            kind: precondition,
            type: state,
            expression: cel,
            value: "gate_packet_ok",
          }
        - {
            id: human_decides_gate,
            kind: invariant,
            type: authority,
            expression: instruction,
            value: "instructions/human-decides-gate.instructions.md",
          }
        - {
            id: output_gate_decisions_md,
            kind: postcondition,
            type: output,
            expression: ref,
            value: "portfolio/gate-decisions.md",
          }
        - {
            id: output_unit_id_md,
            kind: postcondition,
            type: output,
            expression: ref,
            value: "portfolio/{product}/features/{unit_id}.md",
          }
        - {
            id: demo_accepted_cost_committed_and_vmo_notified,
            kind: postcondition,
            type: transition,
            expression: cel,
            value: 'status == "done" && has(unit.cost)',
          }
