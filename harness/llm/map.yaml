          low: 1.0
          medium: 1.2
          high: 1.45
      context_window:
        supported: [small, medium, large]
        default: large
        cost_multipliers:
          small: 1.0
          medium: 1.15
          large: 1.4
    capability_scores:
      deep-reasoning: 5
      code-specialized: 3
      creative: 5
      editorial: 5
      long-context: 5
      multimodal: 2
