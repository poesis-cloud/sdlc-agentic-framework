  "Gemini 2.5 Pro (copilot)": # catalog id: gemini-2.5-pro  |  display name: Gemini 2.5 Pro
    tier: tier-high
    cost_rank: 4
    notes: "Long-context and multimodal specialist."
    dispatch_knobs:
      thinking_effort:
        supported: [low, medium, high]
        default: medium
        cost_multipliers:
          low: 1.0
