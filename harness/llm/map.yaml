# --- Fallback: configuration error, not a runtime shortcut. ---
# If nothing resolves (YAML unreadable, all models below floor): HALT and report
# the misconfiguration to the Central Supervisor. DO NOT silently pass "Auto"
# as the model argument — that produces non-deterministic, unverifiable dispatches.
fallback: HALT_AND_REPORT
