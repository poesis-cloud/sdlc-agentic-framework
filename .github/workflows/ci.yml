---
# CI baseline for sdlc-agentic-framework
# Runs on every push and PR to main.
# Jobs: markdown lint, YAML lint, license-header check (stub — enforces once SHIP content lands).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
          config: ".markdownlint.yaml"

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint --quiet

      - name: Run yamllint
        run: yamllint -d relaxed .

  check-license-headers:
    name: Check License Headers (stub)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: License-header check — stub
        # STUB: passes vacuously until SHIP plugin content is committed (Sprint 2 / F-02).
        # SHIP files are framework constituents (skills/agents/instructions) living under
        # plugins/<name>/ directories in the APM layout. None exist yet in v0.1 scaffold.
        # Replace this step with a real header-check tool once plugin directories land.
          # See license-header-template.txt (repo root) for the required header format.
        run: |
          if [ ! -d "plugins" ]; then
            echo "stub: no plugins/ directory found — SHIP set is empty, licence-header check skipped (OK)"
            exit 0
          fi
          SHIP_FILES=$(find plugins/ \( -name '*.md' -o -name '*.yaml' -o -name '*.yml' \) 2>/dev/null || true)
          if [ -z "$SHIP_FILES" ]; then
            echo "stub: plugins/ exists but contains no SHIP files — licence-header check skipped (OK)"
            exit 0
          fi
          echo "SHIP files detected in plugins/ — licence-header enforcement required (wire real check for F-02)"
          exit 1
